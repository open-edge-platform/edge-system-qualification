name: "profile.suite.ai.gen"
description: "Gen AI suite profile"
version: "1.0.0"
params:
  labels:
    profile_display_name: "Gen AI"
    group: "ai.gen"
    type: "suite"
    display_status: false
  requirements:
    # Hardware requirements
    cpu_min_cores: 2
    memory_min_gib: 5.0
    storage_total_min_gib: 64.0
    storage_min_gib: 10.0  # Free storage for test execution
    # Software requirements
    os_type:
      - "linux"
    docker_required: true
  # Optional: Isolated virtual environment configuration
  # When enabled, tests will run in an isolated venv with specific dependencies
  venv:
    enabled: false  # Set to true to enable isolated venv for this test suite
    requirements_file: "src/text_generation/requirements.txt"  # Relative to suite directory
    python_version: null  # Optional: specify Python version (e.g., "3.10", "3.11")
    timeout: 7200  # Maximum execution time in seconds
  # Modular telemetry configuration
  # Telemetry runs as a lightweight background thread during test execution.
  # Set enabled: false (or remove this block) to disable entirely.
  telemetry:
    enabled: true
    interval: 10  # seconds between samples
    modules:
      # Title, scales, thresholds and axes are defined as defaults within each module.
      # Only specify these here to override the module defaults.
      # --- sysagent core modules ---
      - name: cpu_usage
        enabled: true

      - name: cpu_freq
        enabled: true

      - name: cpu_temp
        enabled: true

      - name: memory_usage
        enabled: true

      # --- ESQ package modules ---
      - name: gpu_usage
        enabled: true

      - name: gpu_freq
        enabled: true

      - name: gpu_temp
        enabled: true

      - name: gpu_power
        enabled: true

      - name: package_power
        enabled: true

      - name: npu_usage
        enabled: true

      - name: npu_freq
        enabled: true



suites:
  - name: "ai"
    sub_suites:
      - name: "gen"
      
        tests:
          test_text_generation:
            params:
              - test_id: "GEN-LLM-001"
                display_name: "LLM Serving Benchmark - DeepSeek-R1-Distill-Qwen-1.5B INT4 (CPU)"
                model_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
                model_precision: "int4"
                devices: [cpu]
                requirements:
                  memory_min_gib: 8.0

              - test_id: "GEN-LLM-002"
                display_name: "LLM Serving Benchmark - DeepSeek-R1-Distill-Qwen-1.5B INT4 (iGPU)"
                model_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
                model_precision: "int4"
                devices: [igpu]
                requirements:
                  igpu_required: true
                  memory_min_gib: 8.0

              - test_id: "GEN-LLM-003"
                display_name: "LLM Serving Benchmark - DeepSeek-R1-Distill-Qwen-1.5B INT4 (dGPU)"
                model_id: "deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B"
                model_precision: "int4"
                devices: [dgpu]
                requirements:
                  dgpu_required: true
                  dgpu_min_vram_per_device_gib: 2.0

              - test_id: "GEN-LLM-004"
