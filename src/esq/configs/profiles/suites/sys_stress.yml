name: "profile.suite.system.stress"
description: "Host machine stress-ng suite with CPU, memory, iGPU, and mixed stress scenarios"
version: "1.0.0"
params:
  stress_duration_seconds_default: &stress_duration_seconds_default 120
  labels:
    profile_display_name: "System Stress"
    group: "system.stress"
    type: "suite"
    display_status: false
  requirements:
    # Hardware requirements
    cpu_min_cores: 4
    memory_min_gib: 8.0
    storage_min_gib: 2.0
    # Software requirements
    os_type:
      - "linux"
    docker_required: false
  # Telemetry configuration
  telemetry:
    enabled: true
    interval: 2  # seconds between samples
    scope: execution    # execution = workload-only sampling; test = full pytest lifecycle
    prerun:
      enabled: true
      duration_s: 10   # idle baseline window before the test
      interval_s: 1    # sample cadence during the idle window
    modules:
      # Use framework/core modules for stress visibility without invoking
      # platform_telemetry runtime dependencies (qmmd/PMT).
      - name: cpu_usage
        enabled: true

      - name: cpu_freq
        enabled: true

      - name: cpu_temp
        enabled: true

      - name: package_power
        enabled: true

      - name: memory_usage
        enabled: true

      - name: gpu_freq
        enabled: true

      - name: gpu_power
        enabled: true

      - name: gpu_temp
        enabled: true

      - name: gpu_usage
        enabled: true

suites:
  - name: "system"
    sub_suites:
      - name: "stress"
        tests:
          test_stress_cpu_gpu:
            params:
              - test_id: "SNG-CPU-001"
                display_name: "CPU 100% 120s"
                description: |
                  CPU-only stress case at 100% CPU load for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: true
                stress_cpu_workers: 0
                stress_cpu_load: 100
                enable_memory_stress: false
                stress_vm_workers: 0
                stress_vm_bytes: "0M"
                enable_gpu_stress: false
                stress_gpu_workers: 0
                key_metric_name: "cpu_bogo_ops_per_real_time"
                timeout: 300

              - test_id: "SNG-CPU-002"
                display_name: "CPU 70% 120s"
                description: |
                  CPU-only stress case at 70% CPU load for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: true
                stress_cpu_workers: 0
                stress_cpu_load: 70
                enable_memory_stress: false
                stress_vm_workers: 0
                stress_vm_bytes: "0M"
                enable_gpu_stress: false
                stress_gpu_workers: 0
                key_metric_name: "cpu_bogo_ops_per_real_time"
                timeout: 300

              - test_id: "SNG-MEM-001"
                display_name: "Memory 2048M 120s"
                description: |
                  Memory stress case using VM stressor with 2048M for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: false
                stress_cpu_workers: 0
                stress_cpu_load: 0
                enable_memory_stress: true
                stress_vm_workers: 1
                stress_vm_bytes: "2048M"
                enable_gpu_stress: false
                stress_gpu_workers: 0
                key_metric_name: "vm_bogo_ops_per_real_time"
                timeout: 300

              - test_id: "SNG-MEM-002"
                display_name: "Memory 512M 120s"
                description: |
                  Memory stress case using VM stressor with 512M for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: false
                stress_cpu_workers: 0
                stress_cpu_load: 0
                enable_memory_stress: true
                stress_vm_workers: 1
                stress_vm_bytes: "512M"
                enable_gpu_stress: false
                stress_gpu_workers: 0
                key_metric_name: "vm_bogo_ops_per_real_time"
                timeout: 300

              - test_id: "SNG-IGP-001"
                display_name: "iGPU Rendering 120s"
                description: |
                  iGPU rendering stress case for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: false
                stress_cpu_workers: 0
                stress_cpu_load: 0
                enable_memory_stress: false
                stress_vm_workers: 0
                stress_vm_bytes: "0M"
                enable_gpu_stress: true
                gpu_tool: "stress-ng"
                stress_gpu_workers: 1
                stress_gpu_device_index: 0
                stress_gpu_ops: 5000
                stress_gpu_frag: 90
                stress_gpu_upload: 32
                stress_gpu_tex_size: 2048
                stress_gpu_xsize: 1920
                stress_gpu_ysize: 1080
                key_metric_name: "gpu_bogo_ops_per_real_time"
                requirements:
                  igpu_required: true
                timeout: 300

              - test_id: "SNG-MIX-001"
                display_name: "CPU 100% + iGPU Rendering 120s"
                description: |
                  Mixed stress case with CPU at 100% and iGPU rendering for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: true
                stress_cpu_workers: 0
                stress_cpu_load: 100
                enable_memory_stress: false
                stress_vm_workers: 0
                stress_vm_bytes: "0M"
                enable_gpu_stress: true
                gpu_tool: "stress-ng"
                stress_gpu_workers: 1
                stress_gpu_device_index: 0
                stress_gpu_ops: 5000
                stress_gpu_frag: 90
                stress_gpu_upload: 32
                stress_gpu_tex_size: 2048
                stress_gpu_xsize: 1920
                stress_gpu_ysize: 1080
                key_metric_name: "gpu_bogo_ops_per_real_time"
                requirements:
                  igpu_required: true
                timeout: 300

              - test_id: "SNG-MIX-002"
                display_name: "CPU 70% + iGPU Rendering 120s"
                description: |
                  Mixed stress case with CPU at 70% and iGPU rendering for 120 seconds.
                stress_duration_seconds: *stress_duration_seconds_default
                enable_cpu_stress: true
                stress_cpu_workers: 0
                stress_cpu_load: 70
                enable_memory_stress: false
                stress_vm_workers: 0
                stress_vm_bytes: "0M"
                enable_gpu_stress: true
                gpu_tool: "stress-ng"
                stress_gpu_workers: 1
                stress_gpu_device_index: 0
                stress_gpu_ops: 5000
                stress_gpu_frag: 90
                stress_gpu_upload: 32
                stress_gpu_tex_size: 2048
                stress_gpu_xsize: 1920
                stress_gpu_ysize: 1080
                key_metric_name: "gpu_bogo_ops_per_real_time"
                requirements:
                  igpu_required: true
                timeout: 300

