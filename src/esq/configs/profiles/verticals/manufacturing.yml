name: "profile.vertical.manufacturing"
display_name: "Manufacturing"
description: "Manufacturing Suites"
version: "1.0.0"
params:
  labels:
    profile_display_name: "Manufacturing"
    group: "manufacturing"
    type: "vertical"
    display_status: false
  requirements:
    os_type:
      - "linux"
    docker_required: true
  assets:
    # Video assets
    - id: "video_warehouse"
      type: "video"
      name: "warehouse_30fps.avi"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/c13b8dbf23d514c2667d39b66615bd1400cb889d/videos/warehouse.avi"
      sha256: "cec6414d5197c3974896bc8f5b15c4a6a683b654f6ec01e9706fcee1b034d748"
    - id: "video_welding"
      type: "video"
      name: "welding_30fps.avi"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/c13b8dbf23d514c2667d39b66615bd1400cb889d/videos/welding.avi"
      sha256: "bd03e671f0cbf8bfc32dae80a11e08a3ff9c3ec5edf6871a26c861bfd6e6af7b"
    # Model assets
    - id: "pallet_defect_detection"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/1d40dfe1791d44e8cf6e8472c28c034e40fa508d/models/INT8/pallet_defect_detection.zip"
      sha256: "377964151cdb10c009525d7a2771d2011b45f4758472fd6ea54d63feaf51522c"
      precision: "int8"
      format: "openvino"
    - id: "weld_porosity_classification"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/c13b8dbf23d514c2667d39b66615bd1400cb889d/models/weld_porosity_classification.zip"
      sha256: "67d40c09ed857f222b35f47dbf93f20aa3f4e70ff8fc4fd4741703a9d7b4c8e7"
      precision: "fp32"
      format: "openvino"
  pipeline_params:
    # PDD baseline reference (upstream team config):
    # https://github.com/open-edge-platform/edge-ai-suites/blob/fb66a5fab8bd69acfc3eefb73c6e6678d7d16be2/manufacturing-ai-suite/industrial-edge-insights-vision/apps/pallet-defect-detection/configs/pipeline-server-config.json
    # Note: ESQ profile applies local tuning/adjustments (for example decode strategy and benchmark-oriented composition).
    PDD_DECODE_ELEMENTS:
      default: "decodebin3"
      cpu: "decodebin ! videoconvert"
      npu: "parsebin ! vah264dec ! 'video/x-raw(memory:VAMemory)'"
      igpu: "parsebin ! va${RENDER_DEVICE}h264dec ! va${RENDER_DEVICE}postproc ! 'video/x-raw(memory:VAMemory)'"
      dgpu: "parsebin ! va${RENDER_DEVICE}h264dec ! 'video/x-raw(memory:VAMemory)'"
    PDD_INFERENCE_ELEMENTS:
      default: "model-instance-id=inst0"
      cpu: "pre-process-backend=opencv model-instance-id=inst0"
      npu: "pre-process-backend=va model-instance-id=inst0"
      igpu: "model-instance-id=instgpu0 inference-region=full-frame inference-interval=1 batch-size=8 nireq=2 ie-config=\"GPU_THROUGHPUT_STREAMS=2\" threshold=0.7 pre-process-backend=va-surface-sharing"
      dgpu: "pre-process-backend=va-surface-sharing model-instance-id=inst0"
    WELD_DECODE_ELEMENTS:
      default: "decodebin ! videoconvert"
      cpu: "decodebin ! videoconvert"
      npu: "parsebin ! vah264dec ! 'video/x-raw(memory:VAMemory)'"
      igpu: "parsebin ! va${RENDER_DEVICE}h264dec ! va${RENDER_DEVICE}postproc ! 'video/x-raw(memory:VAMemory)'"
      dgpu: "parsebin ! va${RENDER_DEVICE}h264dec ! 'video/x-raw(memory:VAMemory)'"
    WELD_INFERENCE_ELEMENTS:
      default: "pre-process-backend=opencv model-instance-id=inst0"
      cpu: "pre-process-backend=opencv model-instance-id=inst0"
      npu: "pre-process-backend=va"
      igpu: "pre-process-backend=va-surface-sharing model-instance-id=inst0"
      dgpu: "pre-process-backend=va-surface-sharing"
    SINK_ELEMENT:
      default: "fakesink sync=true"
  # Modular telemetry configuration
  # Telemetry runs as a lightweight background thread during test execution.
  # Set enabled: false (or remove this block) to disable entirely.
  telemetry:
    enabled: true
    interval: 10  # seconds between samples
    modules:
      # Title, scales, thresholds and axes are defined as defaults within each module.
      # Only specify these here to override the module defaults.
      # --- sysagent core modules ---
      - name: cpu_usage
        enabled: true

      - name: cpu_freq
        enabled: true

      - name: cpu_temp
        enabled: true

      - name: memory_usage
        enabled: true

      # --- ESQ package modules ---
      - name: package_power
        enabled: true

      - name: gpu_temp
        enabled: true

      - name: gpu_freq
        enabled: true

      - name: gpu_power
        enabled: true

      - name: gpu_usage
        enabled: true

      - name: npu_usage
        enabled: true

      - name: npu_freq
        enabled: true


suites:
  - name: "ai"
    sub_suites:
      - name: "vision"
        tests:
          test_dlstreamer:
            params:
              - test_id: "MFG-PDD-001"
                display_name: "Pallet Defect Detection - multi-stream 480p30 H.264 gvadetect YOLOX-TINY INT8 (CPU)"
                target_fps: 29.5
                pipeline: |
                  filesrc location=./videos/warehouse_30fps.avi
                    ! ${PDD_DECODE_ELEMENTS}
                    ! gvadetect model=./models/pallet_defect_detection/deployment/Detection/model/model.xml device=CPU ${PDD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [cpu]
                requirements:
                  cpu_required: true
                kpi_refs:
                  - streams_max_cpu
              - test_id: "MFG-PDD-002"
                display_name: "Pallet Defect Detection - multi-stream 480p30 H.264 gvadetect YOLOX-TINY INT8 (iGPU)"
                target_fps: 29.5
                pipeline: |
                  filesrc location=./videos/warehouse_30fps.avi
                    ! ${PDD_DECODE_ELEMENTS}
                    ! gvadetect model=./models/pallet_defect_detection/deployment/Detection/model/model.xml device=GPU.0 ${PDD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [igpu]
                requirements:
                  igpu_required: true

              - test_id: "MFG-PDD-003"
                display_name: "Pallet Defect Detection - multi-stream 480p30 H.264 gvadetect YOLOX-TINY INT8 (dGPU)"
                target_fps: 29.5
                pipeline: |
                  filesrc location=./videos/warehouse_30fps.avi
                    ! ${PDD_DECODE_ELEMENTS}
                    ! gvadetect model=./models/pallet_defect_detection/deployment/Detection/model/model.xml device=${DEVICE_ID} ${PDD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [dgpu]
                requirements:
                  dgpu_required: true

              - test_id: "MFG-WPC-001"
                display_name: "Weld Porosity Classification - multi-stream 1024p30 H.264 gvaclassify EfficientNet-B0 FP16 (CPU)"
                target_fps: 29.5
                pipeline: |
                  filesrc location=./videos/welding_30fps.avi
                    ! ${WELD_DECODE_ELEMENTS}
                    ! gvaclassify inference-region=full-frame model=./models/weld_porosity_classification/deployment/Classification/model/model.xml device=CPU ${WELD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [cpu]

              - test_id: "MFG-WPC-002"
                display_name: "Weld Porosity Classification - multi-stream 1024p30 H.264 gvaclassify EfficientNet-B0 FP16 (iGPU)"
                target_fps: 29.5
                pipeline: |
                  filesrc location=./videos/warehouse_30fps.avi
                    ! ${WELD_DECODE_ELEMENTS}
                    ! gvaclassify inference-region=full-frame model=./models/weld_porosity_classification/deployment/Classification/model/model.xml device=GPU.0 ${WELD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [igpu]
                requirements:
                  igpu_required: true

              - test_id: "MFG-WPC-003"
                display_name: "Weld Porosity Classification - multi-stream 1024p30 H.264 gvaclassify EfficientNet-B0 FP16 (dGPU)"
                target_fps: 29.5
                timeout: 300
                pipeline: |
                  filesrc location=./videos/welding_30fps.avi
                    ! ${WELD_DECODE_ELEMENTS}
                    ! gvaclassify model=./models/weld_porosity_classification/deployment/Classification/model/model.xml device=${DEVICE_ID} ${WELD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [dgpu]
                requirements:
                  dgpu_required: true
