name: "profile.vertical.manufacturing"
display_name: "Manufacturing"
description: "Manufacturing Suites"
version: "1.0.0"
params:
  labels:
    profile_display_name: "Manufacturing"
    group: "manufacturing"
    type: "vertical"
    display_status: false
  requirements:
    os_type:
      - "linux"
    docker_required: true
  assets:
    # Video assets
    - id: "video_warehouse"
      type: "video"
      name: "warehouse_30fps.avi"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/c13b8dbf23d514c2667d39b66615bd1400cb889d/videos/warehouse.avi"
      sha256: "cec6414d5197c3974896bc8f5b15c4a6a683b654f6ec01e9706fcee1b034d748"
    - id: "video_welding"
      type: "video"
      name: "welding_30fps.avi"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/c13b8dbf23d514c2667d39b66615bd1400cb889d/videos/welding.avi"
      sha256: "bd03e671f0cbf8bfc32dae80a11e08a3ff9c3ec5edf6871a26c861bfd6e6af7b"
    # Model assets
    # Pallet Defect Detection (PDD) - YOLOX-TINY (INT8 / FP16 / FP32) from open-edge-platform/edge-ai-resources
    # Model commit: b943adcf240e22c5c2942a59909982ee2f103f92
    - id: "pallet_defect_detection_int8"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/b943adcf240e22c5c2942a59909982ee2f103f92/models/INT8/pallet_defect_detection.zip"
      sha256: "d8a5cb812421740777723652840555eaa9ad70e5a68bfe1aa717f37b47eb1059"
      precision: "int8"
      format: "openvino"
    - id: "pallet_defect_detection_fp16"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/b943adcf240e22c5c2942a59909982ee2f103f92/models/FP16/pallet_defect_detection.zip"
      sha256: "ab18da2dd5b589f708b479d40f579b161a61dcca0b3d179e920dc6b397a7f559"
      precision: "fp16"
      format: "openvino"
    - id: "pallet_defect_detection_fp32"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/b943adcf240e22c5c2942a59909982ee2f103f92/models/FP32/pallet_defect_detection.zip"
      sha256: "448a081061ebf127edae08d0e8dbaba07dfe120121a96e5910cf09762c4af51c"
      precision: "fp32"
      format: "openvino"
    # Weld Porosity Classification (WPC) - EfficientNet-B0 (INT8 / FP16 / FP32) from open-edge-platform/edge-ai-resources
    # Model commit: b943adcf240e22c5c2942a59909982ee2f103f92
    - id: "weld_porosity_classification_int8"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/b943adcf240e22c5c2942a59909982ee2f103f92/models/INT8/weld_porosity_classification.zip"
      sha256: "ae4c642df912525fa1b6e87583c33f751f6600a4ccad3021f10690cfe73a7ebd"
      precision: "int8"
      format: "openvino"
    - id: "weld_porosity_classification_fp16"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/b943adcf240e22c5c2942a59909982ee2f103f92/models/FP16/weld_porosity_classification.zip"
      sha256: "05329350a13163d4cc7481ba4e42b2f08be06686293ba41d8820eebaf4718b03"
      precision: "fp16"
      format: "openvino"
    - id: "weld_porosity_classification_fp32"
      type: "model"
      source: "zip"
      url: "https://github.com/open-edge-platform/edge-ai-resources/raw/b943adcf240e22c5c2942a59909982ee2f103f92/models/FP32/weld_porosity_classification.zip"
      sha256: "ed26b1684a7132cc3b8f7bd1b1cefa7c33b3fa444c767b19a8eb4e23f43aaa8d"
      precision: "fp32"
      format: "openvino"
  pipeline_params:
    # PDD baseline reference (upstream team config):
    # https://github.com/open-edge-platform/edge-ai-suites/blob/fb66a5fab8bd69acfc3eefb73c6e6678d7d16be2/manufacturing-ai-suite/industrial-edge-insights-vision/apps/pallet-defect-detection/configs/pipeline-server-config.json
    # Note: ESQ profile applies local tuning/adjustments (for example decode strategy and benchmark-oriented composition).
    PDD_DECODE_ELEMENTS:
      default: "decodebin3"
      cpu: "decodebin ! videoconvert"
      npu: "parsebin ! vah264dec ! 'video/x-raw(memory:VAMemory)'"
      igpu: "parsebin ! va${RENDER_DEVICE}h264dec ! va${RENDER_DEVICE}postproc ! 'video/x-raw(memory:VAMemory)'"
      dgpu: "parsebin ! va${RENDER_DEVICE}h264dec ! 'video/x-raw(memory:VAMemory)'"
    PDD_INFERENCE_ELEMENTS:
      default: "model-instance-id=inst0"
      cpu: "pre-process-backend=opencv model-instance-id=inst0"
      npu: "pre-process-backend=va model-instance-id=inst0"
      igpu: "model-instance-id=instgpu0 inference-region=full-frame inference-interval=1 batch-size=8 nireq=2 ie-config=\"GPU_THROUGHPUT_STREAMS=2\" threshold=0.7 pre-process-backend=va-surface-sharing"
      dgpu: "pre-process-backend=va-surface-sharing model-instance-id=inst0"
    WELD_DECODE_ELEMENTS:
      default: "decodebin ! videoconvert"
      cpu: "decodebin ! videoconvert"
      npu: "parsebin ! vah264dec ! 'video/x-raw(memory:VAMemory)'"
      igpu: "parsebin ! va${RENDER_DEVICE}h264dec ! va${RENDER_DEVICE}postproc ! 'video/x-raw(memory:VAMemory)'"
      dgpu: "parsebin ! va${RENDER_DEVICE}h264dec ! 'video/x-raw(memory:VAMemory)'"
    WELD_INFERENCE_ELEMENTS:
      default: "pre-process-backend=opencv model-instance-id=inst0"
      cpu: "pre-process-backend=opencv model-instance-id=inst0"
      npu: "pre-process-backend=va"
      igpu: "pre-process-backend=va-surface-sharing model-instance-id=inst0"
      dgpu: "pre-process-backend=va-surface-sharing"
    SINK_ELEMENT:
      default: "fakesink sync=true"
  # Modular telemetry configuration
  # Telemetry runs as a lightweight background thread during test execution.
  # Set enabled: false (or remove this block) to disable entirely.
  telemetry:
    enabled: true
    interval: 10  # seconds between samples
    modules:
      # Title, scales, thresholds and axes are defined as defaults within each module.
      # Only specify these here to override the module defaults.
      # --- sysagent core modules ---
      - name: cpu_usage
        enabled: true

      - name: cpu_freq
        enabled: true

      - name: cpu_temp
        enabled: true

      - name: memory_usage
        enabled: true

      # --- ESQ package modules ---
      - name: package_power
        enabled: true

      - name: gpu_temp
        enabled: true

      - name: gpu_freq
        enabled: true

      - name: gpu_power
        enabled: true

      - name: gpu_usage
        enabled: true

      - name: npu_usage
        enabled: true

      - name: npu_freq
        enabled: true


suites:
  - name: "ai"
    sub_suites:
      - name: "vision"
        tests:
          test_dlstreamer:
            params:
              - test_id: "MFG-PDD-001"
                display_name: "Pallet Defect Detection - multi-stream 480p30 H.264 gvadetect YOLOX-TINY INT8 (CPU)"
                target_fps: 29.5
                pipeline: |
                  filesrc location=./videos/warehouse_30fps.avi
                    ! ${PDD_DECODE_ELEMENTS}
                    ! gvadetect model=./models/pallet_defect_detection_int8/model.xml device=CPU ${PDD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [cpu]
                kpi_refs:
                  - streams_max
              - test_id: "MFG-PDD-002"
                display_name: "Pallet Defect Detection - multi-stream 480p30 H.264 gvadetect YOLOX-TINY INT8 (iGPU)"
                target_fps: 29.5
