                  filesrc location=./videos/warehouse_30fps.avi
                    ! ${PDD_DECODE_ELEMENTS}
                    ! gvadetect model=./models/pallet_defect_detection_int8/model.xml device=GPU.0 ${PDD_INFERENCE_ELEMENTS}
                    ! queue
                devices: [igpu]
                requirements:
                  igpu_required: true
                kpi_refs:
                  - streams_max

              - test_id: "MFG-PDD-003"
