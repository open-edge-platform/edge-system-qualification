name: "profile.vertical.metro"
display_name: "Metro"
description: "Metro Suites"
version: "1.0.0"
params:
  labels:
    profile_display_name: "Metro"
    group: "metro"
    type: "vertical"
    display_status: false
  depends_on:
    - "profile.suite.system.memory-stream"
    - "profile.suite.system.gpu-ov"
    - "profile.suite.ai.vision-ov"
    - "profile.suite.media.performance-pipelines"
    - "profile.suite.ai.vision-va"
  requirements:
    # Hardware requirements
    cpu_min_cores: 4
    memory_min_gib: 5.0
    storage_total_min_gib: 64.0
    storage_min_gib: 10.0  # Free storage for test execution
    # Software requirements
    os_type:
      - "linux"
    docker_required: true
  # Telemetry configuration
  telemetry:
    enabled: true
    interval: 2  # seconds between samples
    scope: execution    # execution = workload-only sampling; test = full pytest lifecycle
    prerun:
      enabled: true
      duration_s: 10   # idle baseline window before the test
      interval_s: 1    # sample cadence during the idle window
    # Metro proxy pipelines use iGPU + dGPU — the KPI cost-per-fps block
    # highlights which device dominates the power budget per stream.
    kpi_correlation: true
    module_group: external
    modules:
      - name: platform_telemetry
        enabled: true
        group: external
        options:
          # target_devices: omit to auto-collect every CPU/iGPU/dGPU/NPU.
          # To restrict, list canonical labels (quote any with brackets):
          #   target_devices: [CPU, iGPU, "dGPU[0]"]
  container_image: "proxy_pl_bm_runner"
  image_tag: "1.0"
  dockerfile_name: "Dockerfile"

suites:
  - name: "vertical"
    sub_suites:
      - name: "vision"
        tests:
          test_proxy_pipelines:
            params:
              - test_id: "METRO-PROXY-001"
                display_name: "LPR Pipeline (Multi-Devices)"
                devices: [igpu,dgpu]
                pptest: "LPRAIRunner"
                timeout: 4800  # 80 min - runs binary search on both iGPU and dGPU
                force_run: true
                requirements:
                  gpu_required: true

              - test_id: "METRO-PROXY-002"
                display_name: "Smart NVR (iGPU)"
                devices: [igpu]
                pptest: "SmartAIRunner"
                timeout: 3600  # 60 min - binary search on iGPU
                force_run: true
                display_output: 1  # 0=no display, 1=enable display
                requirements:
                  igpu_required: true

              - test_id: "METRO-PROXY-003"
                display_name: "Smart NVR (dGPU)"
                devices: [dgpu]
                pptest: "SmartAIRunner"
                timeout: 7200  # 120 min - dGPU with adaptive search for high stream counts
                force_run: true
                display_output: 1  # 0=no display, 1=enable display
                requirements:
                  dgpu_required: true
                  dgpu_min_devices: 1
                  dgpu_max_devices: 1

              - test_id: "METRO-PROXY-004"
                display_name: "Headed Visual AI Proxy Pipeline (iGPU)"
                devices: [igpu]
                pptest: "VisualAIRunner"
                timeout: 3600  # 60 min - binary search on iGPU
                force_run: true
                display_output: 1  # 0=no display, 1=enable display
                requirements:
                  igpu_required: true

              - test_id: "METRO-PROXY-005"
                display_name: "Headed Visual AI Proxy Pipeline (dGPU)"
                devices: [dgpu]
                pptest: "VisualAIRunner"
                timeout: 4800  # 80 min - dGPU with adaptive search
                force_run: true
                display_output: 1  # 0=no display, 1=enable display
                requirements:
                  dgpu_required: true
                  dgpu_min_devices: 1
                  dgpu_max_devices: 1

              - test_id: "METRO-PROXY-006"
                display_name: "VSaaS Visual AI Proxy Pipeline (iGPU)"
                devices: [igpu]
                pptest: "VsaasAIRunner"
                timeout: 9600  # 160 min - VSaaS runs 3 models with H.265 encoding;
                force_run: true
                requirements:
                  igpu_required: true

              - test_id: "METRO-PROXY-007"
                display_name: "VSaaS Visual AI Proxy Pipeline (dGPU)"
                devices: [dgpu]
                pptest: "VsaasAIRunner"
                timeout: 9600  # 160 min - dGPU binary search needs full budget across all models
                force_run: true
                requirements:
                  dgpu_required: true
                  dgpu_min_devices: 1
                  dgpu_max_devices: 1
