name: "profile.vertical.retail-lp-vlm"
description: "Loss Prevention Visual Language Model Test Suite"
version: "1.0.0"
params:
  labels:
    profile_display_name: "Retail"
    group: "retail"
    type: "vertical"
    display_status: false
  requirements:
    # Hardware requirements
    memory_min_gib: 20.0
    memory_total_min_gib: 30.0
    storage_total_min_gib: 100.0
    storage_min_gib: 20.0  # Free storage for models, videos, and containers
    # Software requirements
    os_type:
      - "linux"
    docker_required: true
  # Modular telemetry configuration
  # Telemetry runs as a lightweight background thread during test execution.
  # Set enabled: false (or remove this block) to disable entirely.
  telemetry:
    enabled: true
    interval: 10  # seconds between samples
    modules:
      # Title, scales, thresholds and axes are defined as defaults within each module.
      # Only specify these here to override the module defaults.
      # --- sysagent core modules ---
      - name: cpu_usage
        enabled: true

      - name: cpu_freq
        enabled: true

      - name: cpu_temp
        enabled: true

      - name: memory_usage
        enabled: true

      # --- ESQ package modules ---
      - name: package_power
        enabled: true

      - name: gpu_temp
        enabled: true

      - name: gpu_freq
        enabled: true

      - name: gpu_power
        enabled: true

      - name: gpu_usage
        enabled: true

      - name: npu_usage
        enabled: true

      - name: npu_freq
        enabled: true


suites:
  - name: "vertical"
    sub_suites:
      - name: "retail"
        tests:
          test_lp_vlm:
            params:
              - test_id: "LP-VLM-001"
                display_name: "Loss Prevention VLM"
                devices: [cpu]
                timeout: 3600  # 60 minutes
                camera_stream: "camera_to_workload_vlm.json"
                commit_id: "2205dc9"  # Loss Prevention repository commit to checkout
                requirements:
                  igpu_required: true
                  cpu_entry_excluded: true
